name: nova
description: "A Flutter AI assistant."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.3
  speech_to_text: ^7.3.0
  http: ^1.6.0
  dio: ^5.9.2
  flutter_tts: ^4.2.5
  animated_text_kit: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/AppIcon.jpg"

flutter:
  uses-material-design: true

  assets:
    - assets/